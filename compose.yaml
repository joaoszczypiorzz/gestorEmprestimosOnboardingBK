version: '3.8'

services:
  postgres-db:
    image: postgres:15
    container_name: db_emprestimos
    environment:
      POSTGRES_DB: banco_emprestimos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: